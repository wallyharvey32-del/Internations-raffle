<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internations Charity Raffle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/mixins.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-header bg-primary text-white text-center py-4">
                        <h2 class="mb-0 fw-bold">🎟️ Internations Raffle</h2>
                        <small class="text-white-50">Supporting Local Charities | $5.00 per ticket</small>
                    </div>
                    <div class="card-body p-4">
                        
                        <div id="alertBox" class="alert d-none" role="alert"></div>

                        <form id="purchaseForm">
                            <div class="mb-3">
                                <label for="buyerName" class="form-label fw-semibold">Full Name</label>
                                <input type="text" class="form-control" id="buyerName" required placeholder="John Doe">
                            </div>

                            <div class="mb-3">
                                <label for="buyerEmail" class="form-label fw-semibold">Email Address</label>
                                <input type="email" class="form-control" id="buyerEmail" required placeholder="johndoe@example.com">
                            </div>

                            <div class="mb-3">
                                <label for="buyerPhone" class="form-label fw-semibold">Mobile Number</label>
                                <input type="tel" class="form-control" id="buyerPhone" required placeholder="0400 123 456">
                            </div>

                            <div class="mb-4">
                                <label for="ticketsPurchased" class="form-label fw-semibold">Number of Tickets</label>
                                <select class="form-select" id="ticketsPurchased" required>
                                    <option value="1">1 Ticket ($5.00)</option>
                                    <option value="2">2 Tickets ($10.00)</option>
                                    <option value="3" selected>3 Tickets ($15.00)</option>
                                    <option value="5">5 Tickets ($25.00)</option>
                                    <option value="10">10 Tickets ($50.00)</option>
                                </select>
                            </div>

                            <div class="mb-4 form-check">
                                <input type="checkbox" class="form-check-input" id="isOver18" required>
                                <label class="form-check-label small text-muted" for="isOver18">
                                    I confirm that I am 18 years of age or older as per local gaming regulations.
                                </label>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold text-uppercase shadow-sm">
                                Complete Purchase
                            </button>
                        </form>

                    </div>
                </div>

                <div id="receiptCard" class="card mt-4 border-success d-none shadow-sm">
                    <div class="card-header bg-success text-white py-3 fw-bold text-center">
                        🎉 Order Confirmed!
                    </div>
                    <div class="card-body">
                        <p class="mb-1"><strong>Transaction ID:</strong> <span id="resTxId" class="text-muted small"></span></p>
                        <p class="mb-1"><strong>Total Cost:</strong> $<span id="resCost"></span>.00 AUD</p>
                        <div class="mt-3">
                            <h6 class="fw-bold text-success mb-2">Your Allocated Ticket Numbers:</h6>
                            <div id="resNumbers" class="d-flex flex-wrap gap-2"></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
